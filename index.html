<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Venom Digital Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins
}

body{
background:#0b0b0b;
color:white;
padding-bottom:80px;
}

/* TRANSITION */

section{
opacity:0;
transform:translateY(20px);
transition:.4s;
display:none;
}

section.active{
opacity:1;
transform:translateY(0);
display:block;
}

/* HEADER */

header{
text-align:center;
padding:20px;
}

header h1{
color:#ff2b2b;
}

/* SEARCH */

.search{
padding:10px 15px;
}

.search input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#111;
color:white;
}

/* HERO VIDEO */

.hero{
height:200px;
margin:10px 15px 20px;
border-radius:15px;
overflow:hidden;
}

.hero video{
width:100%;
height:100%;
object-fit:cover;
}

/* STORE */

.store{
padding:0 15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.product{
background:#111;
border-radius:10px;
overflow:hidden;
}

.product img{
width:100%;
height:120px;
object-fit:cover;
}

.pinfo{
padding:10px;
}

.price{
color:#ff4040;
font-weight:600;
margin-top:3px;
}

.desc{
font-size:12px;
opacity:.8;
margin-top:4px;
}

.buy{
width:100%;
padding:7px;
background:#ff2b2b;
border:none;
color:white;
border-radius:6px;
margin-top:5px;
cursor:pointer;
}

/* CART */

.cart{
padding:20px;
}

.cart-item{
background:#111;
padding:10px;
border-radius:8px;
margin-bottom:8px;
}

/* PROFILE */

.profile{
padding:25px;
text-align:center;
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
border:3px solid red;
object-fit:cover;
margin-bottom:10px;
}

.profile-box{
background:#111;
padding:12px;
border-radius:8px;
margin:10px 0;
}

/* BUTTON */

.btn{
display:block;
text-align:center;
background:#ff2b2b;
padding:10px;
margin:8px 0;
border-radius:6px;
text-decoration:none;
color:white;
}

/* MENU */

.menu{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:12px;
}

.menu button{
background:none;
border:none;
color:white;
font-size:14px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>VENOM STORE</h1>
</header>

<div class="search">
<input type="text" placeholder="Cari produk..." onkeyup="searchProduct(this.value)">
</div>

<!-- HERO VIDEO -->

<div class="hero">

<video autoplay muted loop playsinline>
<source src="https://files.catbox.moe/0meszw.mp4" type="video/mp4">
</video>

</div>

<!-- STORE -->

<section id="store" class="active">
<div class="store" id="storeList"></div>
</section>

<!-- CART -->

<section id="cart">
<div class="cart">
<h2>Keranjang</h2>
<div id="cartList"></div>
</div>
</section>

<!-- PROFILE -->

<section id="profile">

<div class="profile">

<img class="avatar" src="https://files.catbox.moe/g4i6yp.jpg">

<h2>Venom Developer</h2>

<div class="profile-box">
Website digital store Venom untuk layanan bot, hosting, dan tools developer.
</div>

<div class="profile-box">

<b>Contact Admin</b><br><br>

<a href="https://t.me/TheKingVenom" class="btn">Chat Telegram</a>

<a href="https://wa.me/6283866118212" class="btn">Chat WhatsApp</a>

</div>

</div>

</section>

<!-- MENU -->

<div class="menu">

<button onclick="showPage('store')">Store</button>
<button onclick="showPage('cart')">Keranjang</button>
<button onclick="showPage('profile')">Profile</button>

</div>

<script>

let cart=[]

const products=[

{name:"Script Justin",price:"Rp35.000",img:"https://files.catbox.moe/srrdsa.jpg",desc:"Script Bug Gacor"},
{name:"Script Quen Qlitch",price:"Rp35.000",img:"https://files.catbox.moe/9uygq7.jpg",desc:"Script Bug Gacor"},
{name:"Script Ochobot",price:"Rp20.000",img:"https://files.catbox.moe/9uygq7.jpg",desc:"Script Md New"},
{name:"Script Venom Crash",price:"Rp15.000",img:"https://files.catbox.moe/9uygq7.jpg",desc:"Script Bug Gacor"},
{name:"Script Itachi Crash",price:"Rp15.000",img:"https://files.catbox.moe/9uygq7.jpg",desc:"Script Bug X Md"},
{name:"Murid Band Telegram",price:"Rp20.000",img:"https://files.catbox.moe/9uygq7.jpg",desc:"Wrok Band Tele"},
{name:"Murid Band WhatsApp",price:"Rp20.000",img:"https://images.unsplash.com/photo-1556155092-490a1ba16284",desc:"Wrok Band Wa"}, 
{name:"Panel Protection",price:"Rp10.000",img:"https://images.unsplash.com/photo-1563986768609-322da13575f3",desc:"Panel keamanan hosting"},
{name:"Murid Und Band",price:"Rp20.000",img:"https://files.catbox.moe/9uygq7.jpg",desc:"Undband WhatsApp"},
{name:"Murid Logo",price:"Rp10.000",img:"https://files.catbox.moe/9uygq7.jpg",desc:"Plp New Mentahan Logo"},
{name:"Murid Suntik",price:"Rp5.000",img:"https://files.catbox.moe/9uygq7.jpg",desc:"Website Suntik Sosmed"},
{name:"Partner Function",price:"Rp30.000",img:"https://files.catbox.moe/9uygq7.jpg",desc:"Function New Update"},
{name:"Partner Pribadi",price:"Rp50.000",img:"https://files.catbox.moe/9uygq7.jpg",desc:"Get Banyak Benefit"},
{name:"Murid Build Apps",price:"Rp50.000",img:"https://files.catbox.moe/9uygq7.jpg",desc:"Dapet Banyak Tutor + Base"},
{name:"Murid Base",price:"Rp30.000",img:"https://files.catbox.moe/9uygq7.jpg",desc:"Puluhan Base Dan Tutorial"},
{name:"Apps Bug",price:"Rp25.000",img:"https://images.unsplash.com/photo-1550751827-4bd374c3f58b",desc:"Akses Permanen"}

]

const storeList=document.getElementById("storeList")

function renderProducts(list){

storeList.innerHTML=""

list.forEach(p=>{

storeList.innerHTML+=`

<div class="product">

<img src="${p.img}">

<div class="pinfo">

<b>${p.name}</b>

<div class="price">${p.price}</div>

<div class="desc">${p.desc}</div>

<button class="buy" onclick="buyProduct('${p.name}','${p.price}')">BUY</button>

<button class="buy" onclick="addCart('${p.name}')">Keranjang</button>

</div>

</div>

`

})

}

renderProducts(products)

function searchProduct(q){

let result=products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()))
renderProducts(result)

}

function addCart(name){

cart.push(name)
alert("Produk ditambahkan ke keranjang")

}

function buyProduct(name,price){

let text=`Halo Admin Venom Store

Saya ingin membeli produk

Produk : ${name}
Harga : ${price}

Mohon info pembayaran`

let url=`https://t.me/TheKingVenom?text=`+encodeURIComponent(text)

window.open(url,"_blank")

}

function showPage(id){

document.querySelectorAll("section").forEach(sec=>{
sec.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

</script>

</body>
</html>
